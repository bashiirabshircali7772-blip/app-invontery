<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Management System</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>Inventory System</h1>
      <p>Maareynta alaabta, status, action, update, delete iyo create.</p>
    </div>
  </header>

  <main>
    <section class="card form-card">
      <h2>Kudar Alaab Cusub</h2>
      <div id="alert-box" class="alert" style="display: none;"></div>
      <form id="item-form" class="grid-form">
        <label>Magaca Alaabta
          <input id="name" type="text" name="name" placeholder="Magaca alaabta" required />
        </label>
        <label>Tirada
          <input id="quantity" type="number" name="quantity" min="0" value="1" required />
        </label>
        <label>Status
          <select id="status" name="status"></select>
        </label>
        <label>Action
          <input id="action" type="text" name="action" placeholder="Tusaale: Restock, Ship, Inspect" />
        </label>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Add Item</button>
        </div>
      </form>
    </section>

    <section class="card table-card">
      <h2>Inventory List</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Magaca</th>
              <th>Tirada</th>
              <th>Status</th>
              <th>Action</th>
              <th>Update</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody id="inventory-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p>Inventory management system oo HTML iyo JavaScript ku dhisan.</p>
  </footer>

  <script src="static/app.js"></script>
</body>
</html>
